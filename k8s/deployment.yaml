apiVersion: apps/v1
kind: Deployment
metadata:
  name: cameras-api
  labels:
    app: cameras-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cameras-api
  template:
    metadata:
      labels:
        app: cameras-api
    spec:
      containers:
        - name: api
          image: cameras-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: cameras-api
            - name: APP_ENV
              value: production
            - name: APP_PORT
              value: "8080"
            - name: HTTP_CLIENT_TIMEOUT
              value: "10s"
            - name: CATALOG_CACHE_TTL
              value: "15m"
            - name: STREAM_CACHE_TTL
              value: "1m"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cameras-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cameras-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: cameras-api
spec:
  selector:
    app: cameras-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cameras-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  rules:
    - host: beachcam.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cameras-api
                port:
                  number: 80
